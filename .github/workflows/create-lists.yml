name: Create lists ip

on:
  push:
    branches: ["main"]
    paths:
      - .github/workflows/create-lists.yml
      - src/**
  workflow_dispatch:
  schedule:
    - cron: '17 0 * * 3'

permissions:
  contents: write

jobs:
  generate-lists:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Python Scripts
        run: |
          python src/subnets.py

      - name: Update date variable
        id: get_date
        run: |
          # Define the date (UTC)
          CURRENT_DATE=$(date -u +'%d-%m-%Y %H:%M UTC')
          CURRENT_TAG=$(date -u +'%d%m%YT%H%MZ')

          # Export as environment variables
          echo "CURRENT_DATE=$CURRENT_DATE" >> $GITHUB_ENV
          echo "CURRENT_TAG=$CURRENT_TAG" >> $GITHUB_ENV

      - name: Checkout v2fly/geoip tool
        uses: actions/checkout@v6
        with:
          repository: v2fly/geoip
          path: geoip_tool

      - name: Setup Go for Geoip
        uses: actions/setup-go@v6
        with:
          go-version-file: ./geoip_tool/go.mod
          cache-dependency-path: ./geoip_tool/go.sum

      - name: Generate geoip.dat
        run: |
          mkdir -p geoip_tool/config
          cat <<EOF > geoip_tool/config/config.json
          {
            "input": [
              {
                "type": "text",
                "action": "add",
                "args": {
                  "name": "vpn-subnets",
                  "files": [
                    "../subnets/ipv4.lst",
                    "../subnets/ipv6.lst"
                  ]
                }
              }
            ],
            "output": [
              {
                "type": "v2raydat",
                "action": "output",
                "args": {
                  "outputName": "geoip.dat"
                }
              }
            ]
          }
          EOF
          cd geoip_tool
          go build -o geoip_bin ./
          ./geoip_bin convert -c config/config.json
          sha256sum output/geoip.dat > output/geoip.dat.sha256sum
          mv output/geoip.dat ../subnets/
          mv output/geoip.dat.sha256sum ../subnets/

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet subnets/; then
            echo "changes=false" >> $GITHUB_ENV
          else
            echo "changes=true" >> $GITHUB_ENV
          fi

      - name: Push changes to main
        if: env.changes == 'true'
        uses: EndBug/add-and-commit@v9
        with:
          add: 'subnets/'
          author_name: "github-actions[bot]"
          author_email: "github-actions[bot]@users.noreply.github.com"
          message: "Update lists: ${{ env.CURRENT_DATE }}"
          push: true

      - name: Git push assets to "release" branch
        if: env.changes == 'true'
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p /tmp/release_assets
          cp subnets/ipv4.lst subnets/ipv6.lst subnets/dnsmasq_subnets.lst subnets/geoip.dat subnets/geoip.dat.sha256sum /tmp/release_assets/
          
          git checkout -B release
          git rm -rf . || true
          cp -r /tmp/release_assets/* .
          git add .
          git commit -m "Update lists: ${{ env.CURRENT_DATE }}" || echo "No changes"
          git remote set-url origin "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"
          git push -f origin release
          git checkout main

      - name: Create Release with gh CLI
        if: env.changes == 'true'
        run: |
          gh release create "v${{ env.CURRENT_TAG }}" \
            ./subnets/ipv4.lst \
            ./subnets/ipv6.lst \
            ./subnets/dnsmasq_subnets.lst \
            ./subnets/geoip.dat \
            ./subnets/geoip.dat.sha256sum \
            --title "Release ${{ env.CURRENT_DATE }}" \
            --notes "Актуальные списки на ${{ env.CURRENT_DATE }}."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
